<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#ffffff">
    <title>SMOKING MANIA</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();
        tg.setHeaderColor('#ffffff'); tg.setBackgroundColor('#f2f2f7');
        if (tg.isVerticalSwipesEnabled) tg.disableVerticalSwipes();
        tg.enableClosingConfirmation();
        try { tg.requestFullscreen(); } catch (e) {}

        function switchPage(pageId, element) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById('page-' + pageId).classList.add('active');
            if (element) element.classList.add('active');
        }

        function openProduct(name, price, img) {
            const detailPage = document.getElementById('page-detail');
            detailPage.innerHTML = `
                <div class="header" style="margin-top: 0;">
                    <span class="back-btn" onclick="switchPage('shop', document.querySelector('.nav-item'))">← Назад</span>
                    <span>Товар</span>
                    <a href="https://t.me/smokingmaniasup" class="support-header-btn" target="_blank">
                        ?
                        <span class="online-dot"></span>
                    </a>
                </div>
                <div class="product-detail-content">
                    <div class="product-main-img"><img src="${img}"></div>
                    <div class="product-info-box">
                        <div class="detail-title">${name}</div>
                        <div class="detail-price">От ${price} ₽</div>
                        <div class="accordion">Описание <span>▼</span></div>
                        <div class="accordion">Доставка <span>▼</span></div>
                    </div>
                </div>
            `;
            switchPage('detail');
        }
    </script>
    <style>
        /* Основные стили */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            margin: 0; 
            background-color: #f2f2f7; 
            color: #1c1c1e; 
            padding-bottom: 80px; 
            padding-top: calc(env(safe-area-inset-top) + 90px); /* увеличили отступ для закреплённой шапки */
            overscroll-behavior: none; 
            box-sizing: border-box; 
        }
        
        /* Закреплённая шапка */
        .header { 
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            padding: 15px 20px; 
            background: #fff; 
            font-weight: 700; 
            font-size: 18px; 
            border-bottom: 1px solid #e5e5ea;
            margin-top: env(safe-area-inset-top); /* учитываем безопасную зону */
            padding-top: calc(15px + env(safe-area-inset-top));
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        
        /* Кнопка "Назад" остаётся слева */
        .back-btn { 
            position: absolute; 
            left: 20px; 
            cursor: pointer; 
            font-weight: normal; 
        }

        /* Кнопка поддержки внутри шапки (справа) */
        .support-header-btn {
            position: absolute;
            right: 20px;
            background: #6b2d38;
            color: white;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            font-size: 20px;
            font-weight: 700;
            box-shadow: 0 2px 8px rgba(107, 45, 56, 0.3);
            transition: transform 0.1s ease;
            cursor: pointer;
            border: 2px solid #fff;
            position: relative;
        }
        .support-header-btn:active {
            transform: scale(0.92);
        }

        /* Мигающая точка онлайн */
        .online-dot {
            position: absolute;
            bottom: -2px;
            right: -2px;
            width: 14px;
            height: 14px;
            background: #4cd964;
            border: 2px solid #fff;
            border-radius: 50%;
            animation: pulse-dot 1.5s ease-in-out infinite;
            box-shadow: 0 0 0 2px rgba(76, 217, 100, 0.3);
        }

        @keyframes pulse-dot {
            0% { transform: scale(0.95); opacity: 0.7; }
            50% { transform: scale(1.15); opacity: 1; }
            100% { transform: scale(0.95); opacity: 0.7; }
        }

        /* Плавающая кнопка удалена */
        .support-fab { display: none; }

        /* Categories Scroll */
        .categories-scroll { display: flex; overflow-x: auto; gap: 10px; padding: 10px 15px; -webkit-overflow-scrolling: touch; }
        .categories-scroll::-webkit-scrollbar { display: none; }
        .cat-item { background: #fff; padding: 8px 16px; border-radius: 20px; font-size: 13px; font-weight: 500; white-space: nowrap; border: 1px solid #e5e5ea; }
        
        /* Search Bar */
        .search-bar { padding: 0 15px 10px 15px; }
        .search-bar input { width: 100%; padding: 12px 15px; box-sizing: border-box; border-radius: 20px; border: none; background: #eaeaed; font-size: 15px; }
        
        /* Product Detail */
        .product-detail-content { padding: 15px; margin-top: 70px; }
        .product-main-img { background: #fff; border-radius: 16px; padding: 20px; text-align: center; margin-bottom: 15px; }
        .product-main-img img { max-width: 100%; height: 300px; object-fit: contain; }
        .product-info-box { background: #fff; border-radius: 16px; padding: 20px; }
        .detail-title { font-size: 20px; font-weight: 700; margin-bottom: 10px; }
        .detail-price { font-size: 18px; color: #6b2d38; font-weight: 700; margin-bottom: 20px; }
        .accordion { border-top: 1px solid #eee; padding: 15px 0; display: flex; justify-content: space-between; font-weight: 500; font-size: 14px;}
        
        /* Shop Page */
        .banner { background: #6b2d38; color: #fff; margin: 15px; padding: 20px; border-radius: 16px; }
        .products-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 0 15px; }
        .product-card { background: #fff; border-radius: 16px; padding: 12px; cursor: pointer; }
        .product-image-container { height: 110px; display: flex; align-items: center; justify-content: center; margin-bottom: 8px; }
        .product-card img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .product-title { font-size: 13px; height: 32px; overflow: hidden; line-height: 1.2; }
        .product-price { font-weight: 700; margin-top: 4px; font-size: 14px; color: #333;}
        
        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 65px; background: #fff; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #e5e5ea; z-index: 1000; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { text-align: center; font-size: 11px; color: #8e8e93; cursor: pointer; flex: 1; }
        .nav-item.active { color: #6b2d38; font-weight: 600; }
        .nav-item svg { width: 24px; height: 24px; display: block; margin: 0 auto 2px; fill: currentColor; }
        .page { display: none; padding-top: 70px; }
        .page.active { display: block; }

        /* Для страниц без шапки добавляем отступ */
        #page-favorites, #page-cart, #page-account {
            padding-top: 70px;
        }
    </style>
</head>
<body>

    <!-- Шапка с кнопкой поддержки и мигающей точкой -->
    <div class="header" id="main-header">
        <span>SMOKING MANIA</span>
        <a href="https://t.me/smokingmaniasup" class="support-header-btn" target="_blank">
            ?
            <span class="online-dot"></span>
        </a>
    </div>

    <div id="page-shop" class="page active">
        <div class="banner"><h3>Бесплатная доставка от 10.000 ₽</h3></div>
        
        <div class="section-title" style="margin: 0 15px 10px 15px; font-weight:700;">Категории</div>
        <div class="categories-scroll">
            <div class="cat-item">Табак</div>
            <div class="cat-item">Кальяны</div>
            <div class="cat-item">Аксессуары</div>
            <div class="cat-item">Уголь</div>
            <div class="cat-item">Чаши</div>
        </div>

        <div class="search-bar"><input type="text" placeholder="Поиск товаров"></div>
        
        <div class="products-grid" id="products-container"><div>Загрузка...</div></div>
    </div>

    <!-- Остальные страницы -->
    <div id="page-detail" class="page"></div>
    <div id="page-favorites" class="page">
        <div class="banner" style="margin: 15px;"><h3>Избранное</h3></div>
        <div style="padding: 15px; text-align: center; color: #8e8e93;">Здесь будут ваши любимые товары</div>
    </div>
    <div id="page-cart" class="page">
        <div class="banner" style="margin: 15px;"><h3>Корзина</h3></div>
        <div style="padding: 15px; text-align: center; color: #8e8e93;">Ваша корзина пуста</div>
    </div>
    <div id="page-account" class="page">
        <div class="banner" style="margin: 15px;"><h3>Аккаунт</h3></div>
        <div style="padding: 15px; text-align: center; color: #8e8e93;">Информация о профиле</div>
    </div>

    <!-- Навигация -->
    <div class="nav-bar">
        <div class="nav-item active" onclick="switchPage('shop', this)">
            <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>Магазин
        </div>
        <div class="nav-item" onclick="switchPage('favorites', this)">
            <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>Избранное
        </div>
        <div class="nav-item" onclick="switchPage('cart', this)">
            <svg viewBox="0 0 24 24"><path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/></svg>Корзина
        </div>
        <div class="nav-item" onclick="switchPage('account', this)">
            <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>Аккаунт
        </div>
    </div>

    <script>
        async function loadProducts() {
            const container = document.getElementById('products-container');
            try {
                const response = await fetch('/api/get-data');
                const data = await response.json();
                container.innerHTML = '';
                (data.rows || []).filter(p => !p.archived).forEach(prod => {
                    const price = (prod.salePrices?.[0]?.value || 0) / 100;
                    const img = prod.images?.rows?.[0]?.miniature?.downloadHref || 'https://via.placeholder.com/150';
                    const card = document.createElement('div');
                    card.className = 'product-card';
                    card.onclick = () => openProduct(prod.name, price, img);
                    card.innerHTML = `<div class="product-image-container"><img src="${img}"></div><div class="product-title">${prod.name}</div><div class="product-price">${price.toLocaleString()} ₽</div>`;
                    container.appendChild(card);
                });
            } catch (e) { container.innerHTML = 'Ошибка загрузки'; }
        }
        loadProducts();
    </script>
</body>
</html>
