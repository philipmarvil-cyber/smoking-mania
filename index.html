<!DOCTYPE html><html lang="ru"><head>    <meta charset="UTF-8">    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">    <title>НЕШОП</title>    <script src="https://telegram.org/js/telegram-web-app.js"></script>    <style>        :root {            --bg-color: #f7f7f7;            --card-bg: #ffffff;            --text-main: #222222;            --text-muted: #777777;            --accent-burgundy: #6b2d38;        }        body {            font-family: -apple-system, BlinkMacSystemFont, sans-serif;            background-color: var(--bg-color);            margin: 0;            padding: 0;            color: var(--text-main);            padding-bottom: 80px;        }        .header {            display: flex;            justify-content: center;            align-items: center;            padding: 15px;            background: var(--card-bg);        }        .logo {            font-weight: 800;            font-size: 20px;            letter-spacing: 2px;            text-transform: uppercase;        }        .search-container {            padding: 10px 15px;        }        .search-input {            width: 100%;            padding: 12px 15px;            border: 1px solid #e0e0e0;            border-radius: 10px;            font-size: 15px;            box-sizing: border-box;            background-color: var(--card-bg);        }        .banner {            margin: 10px 15px;            background: var(--accent-burgundy);            color: white;            border-radius: 20px;            padding: 25px 20px;        }        .banner h2 {            margin: 0 0 10px 0;            font-size: 22px;            font-weight: 700;            line-height: 1.2;        }        .banner p {            margin: 0 0 20px 0;            font-size: 14px;            opacity: 0.8;        }        .banner .btn {            background: white;            color: black;            padding: 10px 25px;            border-radius: 20px;            display: inline-block;            font-weight: 600;            text-decoration: none;            font-size: 14px;        }        .section-title {            padding: 15px 15px 5px 15px;            margin: 0;            font-size: 18px;            font-weight: 700;        }                /* Сетка для динамических брендов/товаров */        .brands-grid {            display: grid;            grid-template-columns: repeat(4, 1fr);            gap: 12px;            padding: 10px 15px;        }        .brand-item {            display: flex;            flex-direction: column;            align-items: center;            text-align: center;        }        .brand-img {            width: 100%;            aspect-ratio: 1;            background: var(--card-bg);            border-radius: 18px;            display: flex;            align-items: center;            justify-content: center;            font-weight: bold;            font-size: 11px;            box-shadow: 0 2px 5px rgba(0,0,0,0.03);            border: 1px solid #ededed;            overflow: hidden;        }        .brand-img img {            width: 100%;            height: 100%;            object-fit: cover;        }        .brand-item span {            font-size: 11px;            margin-top: 6px;            color: var(--text-main);            white-space: nowrap;            overflow: hidden;            text-overflow: ellipsis;            width: 100%;        }        .categories-grid {            display: grid;            grid-template-columns: repeat(2, 1fr);            gap: 12px;            padding: 10px 15px;        }        .category-card {            background: #4a4e51;            height: 100px;            border-radius: 15px;            padding: 15px;            box-sizing: border-box;        }        /* Исправленное нижнее меню с SVG иконками вместо ломающихся эмодзи */        .bottom-nav {            position: fixed;            bottom: 0;            left: 0;            right: 0;            height: 65px;            background: var(--card-bg);            display: flex;            justify-content: space-around;            align-items: center;            border-top: 1px solid #e0e0e0;            z-index: 1000;        }        .nav-item {            display: flex;            flex-direction: column;            align-items: center;            color: var(--text-muted);            text-decoration: none;            font-size: 11px;        }        .nav-item.active {            color: var(--text-main);        }        .nav-icon {            width: 22px;            height: 22px;            margin-bottom: 4px;            fill: currentColor;        }    </style></head><body>    <div class="header">        <div class="logo">НЕШОП</div>    </div>    <div class="search-container">        <input type="text" class="search-input" placeholder="Поиск по товарам и брендам">    </div>    <div class="banner">        <h2>Бесплатная доставка<br>от 10.000 ₽</h2>        <p>Доставка по г. Москва</p>        <a href="#" class="btn">Смотреть</a>    </div>    <h3 class="section-title">Товары из МоегоСклада</h3>    <div class="brands-grid" id="products-container">        <!-- Сюда данные загрузятся автоматически через JS -->        <div style="grid-column: span 4; text-align: center; color: var(--text-muted); padding: 20px;">Загрузка товаров...</div>    </div>    <h3 class="section-title">Категории</h3>    <div class="categories-grid">        <div class="category-card"></div>        <div class="category-card"></div>    </div>    <!-- Исправленный Таб-бар -->    <div class="bottom-nav">        <a href="#" class="nav-item active">            <svg class="nav-icon" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>            <span>Магазин</span>        </a>        <a href="#" class="nav-item">            <svg class="nav-icon" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>            <span>Избранное</span>        </a>        <a href="#" class="nav-item">            <svg class="nav-icon" viewBox="0 0 24 24"><path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/></svg>            <span>Корзина</span>        </a>        <a href="#" class="nav-item">            <svg class="nav-icon" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>            <span>Аккаунт</span>        </a>    </div>    <script>        const tg = window.Telegram.WebApp;        tg.expand();        // Функция автоматического запроса к нашему бэкенду        async function loadProducts() {            try {                const response = await fetch('/api/get-data');                const data = await response.json();                                const container = document.getElementById('products-container');                container.innerHTML = ''; // Очищаем текст "Загрузка"                if (data.rows && data.rows.length > 0) {                    data.rows.forEach(product => {                        const item = document.createElement('div');                        item.className = 'brand-item';                                                // Проверяем, есть ли изображение у товара, иначе ставим текстовую заглушку                        const imgHtml = product.image ? `<img src="${product.image.meta.downloadHref}" alt="">` : product.name.substring(0, 3).toUpperCase();                        item.innerHTML = `                            <div class="brand-img">${imgHtml}</div>                            <span>${product.name}</span>                        `;                        container.appendChild(item);                    });                } else {                    container.innerHTML = '<div style="grid-column: span 4; text-align: center; padding: 20px;">Товары не найдены</div>';                }            } catch (error) {                console.error("Ошибка загрузки данных:", error);                document.getElementById('products-container').innerHTML = '<div style="grid-column: span 4; text-align: center; color: red; padding: 20px;">Ошибка подключения к Складу</div>';            }        }        // Запускаем загрузку при открытии страницы        loadProducts();    </script></body></html>
