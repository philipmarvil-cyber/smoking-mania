<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#ffffff">
    <title>SMOKING MANIA</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();
        tg.setHeaderColor('#ffffff'); tg.setBackgroundColor('#f2f2f7');
        
        function switchPage(pageId, element) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById('page-' + pageId).classList.add('active');
            if (element) element.classList.add('active');
        }

        // Логика формы
        function toggleAuthMode(isRegister) {
            const title = document.getElementById('auth-title');
            const btn = document.getElementById('auth-btn');
            const toggle = document.getElementById('auth-toggle');
            
            if (isRegister) {
                title.innerText = "Регистрация";
                btn.innerText = "Зарегистрироваться";
                toggle.innerHTML = 'Уже есть аккаунт? <b onclick="toggleAuthMode(false)">Войти</b>';
            } else {
                title.innerText = "Вход";
                btn.innerText = "Войти";
                toggle.innerHTML = 'Нет аккаунта? <b onclick="toggleAuthMode(true)">Регистрация</b>';
            }
        }

        function handleAuth(event) {
            event.preventDefault();
            alert("Форма отправлена! (Здесь будет ваш API запрос)");
            // Пример: fetch('/api/register', { ... })
        }

        function openProduct(name, price, img) {
            const detailPage = document.getElementById('page-detail');
            detailPage.innerHTML = `
                <div class="header-safe-zone">
                    <div class="back-btn" onclick="switchPage('shop', document.querySelector('.nav-item'))">← Назад</div>
                </div>
                <div class="product-detail-content">
                    <div class="product-main-img"><img src="${img}"></div>
                    <div class="product-info-box">
                        <div class="detail-title">${name}</div>
                        <div class="detail-price">От ${price} ₽</div>
                    </div>
                </div>
            `;
            switchPage('detail');
        }
    </script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; margin: 0; background-color: #f2f2f7; padding-bottom: 80px; overscroll-behavior: none; }
        
        /* Исправление перекрытия: добавляем отступ сверху для всех страниц */
        .page { padding-top: env(safe-area-inset-top); }
        .header-safe-zone { padding: 15px 20px; background: #fff; display: flex; align-items: center; border-bottom: 1px solid #e5e5ea; position: sticky; top: 0; z-index: 100; }
        .back-btn { cursor: pointer; font-size: 16px; color: #6b2d38; padding: 5px 0; }

        /* Auth Styles */
        .auth-container { padding: 20px; }
        .input-field { width: 100%; padding: 15px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 12px; background: #fff; box-sizing: border-box; }
        .btn-submit { width: 100%; padding: 15px; background: #6b2d38; color: #fff; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }

        /* Остальные стили */
        .support-fab { position: fixed; bottom: 85px; right: 20px; background: #6b2d38; color: white; width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3); z-index: 1000; text-decoration: none; font-size: 24px; }
        .banner { background: #6b2d38; color: #fff; margin: 15px; padding: 20px; border-radius: 16px; }
        .categories-scroll { display: flex; overflow-x: auto; gap: 10px; padding: 10px 15px; }
        .cat-item { background: #fff; padding: 8px 16px; border-radius: 20px; font-size: 13px; font-weight: 500; white-space: nowrap; border: 1px solid #e5e5ea; }
        .search-bar { padding: 0 15px 10px 15px; }
        .search-bar input { width: 100%; padding: 12px 15px; box-sizing: border-box; border-radius: 20px; border: none; background: #eaeaed; }
        .products-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 0 15px; }
        .product-card { background: #fff; border-radius: 16px; padding: 12px; cursor: pointer; }
        .product-image-container { height: 110px; display: flex; align-items: center; justify-content: center; margin-bottom: 8px; }
        .product-card img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .product-title { font-size: 13px; height: 32px; overflow: hidden; }
        .product-price { font-weight: 700; margin-top: 4px; font-size: 14px; }
        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 65px; background: #fff; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #e5e5ea; z-index: 1000; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { text-align: center; font-size: 11px; color: #8e8e93; cursor: pointer; flex: 1; }
        .nav-item.active { color: #6b2d38; font-weight: 600; }
        .nav-item svg { width: 24px; height: 24px; display: block; margin: 0 auto 2px; fill: currentColor; }
        .page { display: none; }
        .page.active { display: block; }
    </style>
</head>
<body>

    <a href="https://t.me/ВАШ_USERNAME" class="support-fab" target="_blank">?</a>

    <div id="page-shop" class="page active">
        <div class="header-safe-zone"><b>SMOKING MANIA</b></div>
        <div class="banner"><h3>Бесплатная доставка от 10.000 ₽</h3></div>
        <div class="categories-scroll">
            <div class="cat-item">Табак</div><div class="cat-item">Кальяны</div>
            <div class="cat-item">Аксессуары</div><div class="cat-item">Уголь</div>
        </div>
        <div class="search-bar"><input type="text" placeholder="Поиск товаров"></div>
        <div class="products-grid" id="products-container"><div>Загрузка...</div></div>
    </div>

    <div id="page-detail" class="page"></div>

    <div id="page-account" class="page">
        <div class="header-safe-zone"><b>Личный кабинет</b></div>
        <div class="auth-container">
            <h3 id="auth-title">Вход</h3>
            <form onsubmit="handleAuth(event)">
                <input type="text" class="input-field" placeholder="Телефон" required>
                <input type="password" class="input-field" placeholder="Пароль" required>
                <button type="submit" class="btn-submit" id="auth-btn">Войти</button>
            </form>
            <p id="auth-toggle" style="text-align:center; margin-top:20px; font-size: 14px;">Нет аккаунта? <b onclick="toggleAuthMode(true)">Регистрация</b></p>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="switchPage('shop', this)">
            <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>Магазин
        </div>
        <div class="nav-item" onclick="switchPage('account', this)">
            <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>Аккаунт
        </div>
    </div>

    <script>
        async function loadProducts() {
            const container = document.getElementById('products-container');
            // Mock data or real fetch
            const prod = { name: "Пример товара", salePrices: [{value: 50000}] };
            container.innerHTML = `<div class="product-card" onclick="openProduct('${prod.name}', 500, 'https://via.placeholder.com/150')">
                <div class="product-image-container"><img src="https://via.placeholder.com/150"></div>
                <div class="product-title">${prod.name}</div>
                <div class="product-price">500 ₽</div>
            </div>`;
        }
        loadProducts();
    </script>
</body>
</html>
